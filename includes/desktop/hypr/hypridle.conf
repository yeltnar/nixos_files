$sleep_timeout = {{ 5 * 60 }} # 5 minutes
$extra_lock_time = {{ 10 * 60 }} # 10 min
$lock_timeout = {{ $sleep_timeout + $extra_lock_time }}

general {
    lock_cmd = pidof hyprlock || hyprlock # Avoid starting multiple hyprlock instances
    before_sleep_cmd = hyprlock # Lock before suspend
    after_sleep_cmd = hyprctl dispatch 'hl.dsp.dpms({action="on"})' # Turn monitor back on after resume
}

listener {
    timeout = $sleep_timeout # 5 minutes of inactivity
    # Command to turn the display off
    on-timeout = hyprctl dispatch 'hl.dsp.dpms({action="off"})'
    on-resume = hyprctl dispatch 'hl.dsp.dpms({action="on"})'
}

listener {
    timeout = $lock_timeout # 5.5 minutes of inactivity
    # Command to turn the display off and lock screen 
    on-timeout = hyprlock
}

